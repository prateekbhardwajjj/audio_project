version: '3.8'

services:
  qwen:
    build:
      context: . # Run the build from the root folder
      dockerfile: ./qwen_service/Dockerfile
    ports:
      - "8001:8000" # Maps port 8001 on your computer to 8000 in the container
    volumes:
      - ./qwen_service:/app           # Mounts the service code
      - ./common_lib:/app/common_lib  # Mounts the shared library
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  chatterbox:
    build:
      context: .
      dockerfile: ./chatterbox_service/Dockerfile
    ports:
      - "8002:8000" # Maps port 8002 on your computer to 8000 in the container
    volumes:
      - ./chatterbox_service:/app
      - ./common_lib:/app/common_lib
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload